services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: dev-environment
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://host.docker.internal:5173
    networks:
      - network
networks:
 network:
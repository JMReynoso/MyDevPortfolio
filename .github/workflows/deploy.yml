name: Deploy to self-hosted server

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, macOS, ARM64]  # matches runner labels
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        run: |
          if ! command -v node >/dev/null 2>&1; then
            brew install node
          fi

      - name: Build app
        run: |
          npm ci
          npm run build

      # add unit tests
      - name: Run tests
        run: |
          npm run test

      - name: Run tests and generate coverage
        # Replace with your specific command, e.g., 'npm test -- --coverage' or 'pytest --cov=./ --cov-report=xml'
        run: npm run coverage --coverageReporters=lcov

      - name: Post coverage report to PR
        # Example using a generic LCOV reporter action
        uses: romeovs/lcov-reporter-action@v0.5.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Path to the generated coverage file
          lcov-file: ./coverage/lcov.info

      - name: Deploy (Docker)
        working-directory: .
        run: |
          export VITE_WEB3FORMS_ACCESS_KEY=${{ secrets.WEB3FORMS_ACCESS_KEY }}
          # Option A: Docker
          docker-compose -f docker-compose.prod.yml down
          docker-compose -f docker-compose.prod.yml up --build -d
          # Or Option B: bare-metal restart (pm2, launchctl, etc.)
          # pm2 restart myapp

          # Or Option B: bare-metal restart (pm2, launchctl, etc.)
          # pm2 restart myapp

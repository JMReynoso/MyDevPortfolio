name: Deploy to self-hosted server

jobs:
  deploy:
    runs-on: [self-hosted, macOS, ARM64]  # matches runner labels
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node (example for a Node app)
        run: |
          if ! command -v node >/dev/null 2>&1; then
            brew install node
          fi

      - name: Build app
        run: |
          npm ci
          npm run build

      # add unit tests

      - name: Deploy (Docker or bare-metal)
        run: |
          cd /opt/apps/myapp
          # Option A: Docker
          docker build -t my-portfolio:prod . 
          docker run -p 5173:5173 my-portfolio:prod
          # Or Option B: bare-metal restart (pm2, launchctl, etc.)
          # pm2 restart myapp

          # Or Option B: bare-metal restart (pm2, launchctl, etc.)
          # pm2 restart myapp
